</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <div class="logo">D</div>
        <div>
          <div class="title">Demand Intelligence Platform</div>
          <div class="subtitle">为 CEO 与业务线负责人提供客群、需求与产品决策</div>
        </div>
      </div>
      <div class="topbar-side">
        <div class="product-top-actions">
          <a href="./index.html" class="button secondary">返回首页</a>
          <div class="auth-panel" id="auth-panel"></div>
        </div>
        <div class="meta" id="meta-pills"></div>
      </div>
    </div>

    <div class="toolbar">
      <div class="view-tabs" id="view-tabs"></div>
      <div class="filters">
        <div class="chip is-active" id="market-chip">市场：美国 dropshipping</div>
        <div class="chip" id="range-chip">周期：近 30 天</div>
        <div class="chip" id="confidence-chip">Confidence：High</div>
        <label class="inline-select">
          <span>刷新模式</span>
          <select id="refresh-mode-select">
            <option value="seeded">seeded</option>
            <option value="browser">browser</option>
          </select>
        </label>
        <button type="button" class="button secondary" id="refresh-study-button">刷新当前 Study</button>
      </div>
    </div>

    <section id="study-rail"></section>

    <section id="view-dashboard"></section>
    <section id="view-operations" class="hidden"></section>
    <section id="view-setup" class="hidden"></section>
    <section id="view-segments" class="hidden"></section>
    <section id="view-packaging" class="hidden"></section>
    <section id="view-weekly" class="hidden"></section>
  </div>

  <div class="toast-stack" id="toast-stack"></div>

  <footer class="site-footer app-footer">
    <div>
      <strong>Demand Intelligence Platform</strong>
      <span>产品演示页：用于查看客群优先级、产品包装、趋势变化与证据摘要。</span>
    </div>
    <div class="site-footer-links">
      <a href="./index.html">首页</a>
      <a href="https://github.com/Perrilee711/raddit">GitHub</a>
      <a href="mailto:team@example.com">联系产品负责人</a>
    </div>
  </footer>

  <script src="./data/fishgoo-dashboard-payload.js"></script>
  <script src="./mvp-app.js"></script>
</body>
